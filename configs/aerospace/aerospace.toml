config-version = 2

after-startup-command = [
  'exec-and-forget brew services run sketchybar'
]

exec-on-workspace-change = ['/bin/bash', '-c',
  'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE PREV_WORKSPACE=$AEROSPACE_PREV_WORKSPACE'
]

start-at-login = true

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30

default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
automatically-unhide-macos-hidden-apps = false

persistent-workspaces = ["1", "2", "3", "4", "5", "6"]

on-mode-changed = [
  'exec-and-forget sketchybar --trigger aerospace_mode_change'
]

[key-mapping]
    preset = 'qwerty'

[gaps]
    inner.horizontal = 0
    inner.vertical =   0
    outer.left =       0
    outer.bottom =     0
    outer.top =        [{ monitor.built-in = 0 }, 30]
    outer.right =      0

[workspace-to-monitor-force-assignment]
    1 = ['main', 'built-in']
    2 = ['main', 'built-in']
    3 = ['main', 'built-in']
    4 = ['secondary', 'sidecar', 'built-in']
    5 = ['secondary', 'sidecar', 'built-in']
    6 = ['secondary', 'sidecar', 'built-in']

[[on-window-detected]]
    if.app-id = 'com.tinyspeck.slackmacgap'
    run = [
      'move-node-to-workspace chat',
      'move-workspace-to-monitor --workspace chat secondary sidecar main'
    ]

[[on-window-detected]]
    if.app-id = 'com.microsoft.Outlook'
    run = [
      'move-node-to-workspace mail',
      'move-workspace-to-monitor --workspace mail secondary sidecar main'
    ]

[[on-window-detected]]
    if.app-id = 'com.apple.Music'
    run = [
      'move-node-to-workspace music',
      'move-workspace-to-monitor --workspace mail secondary sidecar main'
    ]

[[on-window-detected]]
    if.app-id = 'ch.protonmail.desktop'
    run = [
      'move-node-to-workspace mail',
      'move-workspace-to-monitor --workspace mail main'
    ]

[[on-window-detected]]
    if.app-id = 'org.qbittorrent.qBittorrent'
    run = [
      'move-node-to-workspace torrent',
      'move-workspace-to-monitor --workspace torrent main'
    ]

[[on-window-detected]]
    if.app-id = 'com.microsoft.teams2'
    run = 'move-node-to-workspace 6'

[[on-window-detected]]
    if.app-id = 'org.qutebrowser.qutebrowser'
    if.during-aerospace-startup = true
    run = 'move-node-to-workspace 4'

[[on-window-detected]]
    if.app-id = 'com.colliderli.iina'
    run = 'layout floating'

[mode.main.binding]

    # All possible keys:
    # - Letters.        a, b, c, ..., z
    # - Numbers.        0, 1, 2, ..., 9
    # - Keypad numbers. keypad0, keypad1, keypad2, ..., keypad9
    # - F-keys.         f1, f2, ..., f20
    # - Special keys.   minus, equal, period, comma, slash, backslash, quote, semicolon,
    #                   backtick, leftSquareBracket, rightSquareBracket, space, enter, esc,
    #                   backspace, tab, pageUp, pageDown, home, end, forwardDelete,
    #                   sectionSign (ISO keyboards only, european keyboards only)
    # - Keypad special. keypadClear, keypadDecimalMark, keypadDivide, keypadEnter, keypadEqual,
    #                   keypadMinus, keypadMultiply, keypadPlus
    # - Arrows.         left, down, up, right

    # All possible modifiers: cmd, alt, ctrl, shift

    alt-slash = 'layout tiles horizontal vertical'
    alt-comma = 'layout accordion horizontal vertical'

    alt-h = 'focus left'
    alt-j = 'focus down'
    alt-k = 'focus up'
    alt-l = 'focus right'

    alt-shift-h = 'move left'
    alt-shift-j = 'move down'
    alt-shift-k = 'move up'
    alt-shift-l = 'move right'

    alt-minus = 'resize smart -50'
    alt-equal = 'resize smart +50'

    alt-1 = 'workspace 1'
    alt-2 = 'workspace 2'
    alt-3 = 'workspace 3'
    alt-4 = 'workspace 4'
    alt-5 = 'workspace 5'
    alt-6 = 'workspace 6'
    alt-7 = 'workspace 7'
    alt-8 = 'workspace 8'
    alt-9 = 'workspace 9'

    alt-n = 'workspace --wrap-around next'
    alt-p = 'workspace --wrap-around prev'

    alt-f = 'exec-and-forget open /System/Library/CoreServices/Finder.app'
    alt-q = 'exec-and-forget open /Applications/qutebrowser.app'
    alt-t = 'exec-and-forget open /Applications/Ghostty.app'
    alt-m = 'exec-and-forget open /System/Applications/Music.app'
    alt-o = [
      'exec-and-forget bash -c "osascript -e \"tell application \\\"Microsoft Outlook\\\" to activate\" || open \"/Applications/Microsoft Outlook.app\""',
      'exec-and-forget bash -c "osascript -e \"tell application \\\"Proton Mail\\\" to activate\" || open \"/Applications/Proton Mail.app\""',
    ]
    alt-c = 'exec-and-forget bash -c "osascript -e \"tell application \\\"Microsoft Teams\\\" to activate\" || open \"/Applications/Microsoft Teams.app\""'
    alt-s = 'exec-and-forget bash -c "osascript -e \"tell application \\\"Slack\\\" to activate\" || open \"/Applications/Slack.app\""'

    alt-shift-1 = 'move-node-to-workspace 1 --focus-follows-window'
    alt-shift-2 = 'move-node-to-workspace 2 --focus-follows-window'
    alt-shift-3 = 'move-node-to-workspace 3 --focus-follows-window'
    alt-shift-4 = 'move-node-to-workspace 4 --focus-follows-window'
    alt-shift-5 = 'move-node-to-workspace 5 --focus-follows-window'
    alt-shift-6 = 'move-node-to-workspace 6 --focus-follows-window'
    alt-shift-7 = 'move-node-to-workspace 7 --focus-follows-window'
    alt-shift-8 = 'move-node-to-workspace 8 --focus-follows-window'
    alt-shift-9 = 'move-node-to-workspace 9 --focus-follows-window'

    alt-shift-f = 'fullscreen'

    alt-tab = 'workspace-back-and-forth'
    alt-shift-tab = 'move-node-to-monitor --focus-follows-window --wrap-around next'

    alt-shift-a = 'mode service'
    alt-shift-semicolon = 'mode service'

[mode.service.binding]
    esc = ['reload-config', 'mode main']
    alt-shift-r = ['reload-config', 'exec-and-forget sketchybar --reload', 'mode main']
    r = ['flatten-workspace-tree', 'mode main'] # reset layout
    f = ['layout floating tiling', 'mode main'] # Toggle between floating and tiling layout

    alt-shift-1 = ['move-node-to-workspace 1', 'mode main']
    alt-shift-2 = ['move-node-to-workspace 2', 'mode main']
    alt-shift-3 = ['move-node-to-workspace 3', 'mode main']
    alt-shift-4 = ['move-node-to-workspace 4', 'mode main']
    alt-shift-5 = ['move-node-to-workspace 5', 'mode main']
    alt-shift-6 = ['move-node-to-workspace 6', 'mode main']
    alt-shift-7 = ['move-node-to-workspace 7', 'mode main']
    alt-shift-8 = ['move-node-to-workspace 8', 'mode main']
    alt-shift-9 = ['move-node-to-workspace 9', 'mode main']

    alt-shift-f = ['exec-and-forget bash "$(dirname "$(aerospace config --config-path)")/toggle-gap.sh" 30', 'mode main']

    alt-shift-tab = ['move-workspace-to-monitor --wrap-around next', 'mode main']

    alt-shift-h = ['join-with left', 'mode main']
    alt-shift-j = ['join-with down', 'mode main']
    alt-shift-k = ['join-with up', 'mode main']
    alt-shift-l = ['join-with right', 'mode main']
